name: Refresh course calendar data
on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 0'
jobs:
  build-calendar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/generate_ics.py
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add courses.json the-kiwi-dialectic-courses.ics
          git diff --cached --quiet || git commit -m "Refresh course calendar"
          git push
